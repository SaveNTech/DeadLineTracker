services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-deadline_tracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-deadline_tracker}
    ports:
      # Host port defaults to 5433 to avoid clashing with a locally installed
      # Postgres on 5432. Override DB_HOST_PORT in .env if that's also taken
      # (e.g. on a shared host running other projects).
      - "${DB_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deadline_tracker}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      default:
        ipv4_address: 172.28.0.10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-deadline_tracker}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-deadline_tracker}
    ports:
      # Override BACKEND_HOST_PORT in .env if 8000 is already taken on the
      # host (e.g. on a shared server running other projects).
      - "${BACKEND_HOST_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    # Some sandboxed/nested-Docker hosts break the embedded DNS resolver
    # (127.0.0.11), so service names like "db" don't resolve. extra_hosts
    # pins it via /etc/hosts instead, independent of DNS.
    extra_hosts:
      - "db:172.28.0.10"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

networks:
  default:
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
